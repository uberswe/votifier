name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Parse version info
        id: tag
        env:
          GIT_REF: ${{ github.ref }}
        run: |
          if [[ "$GIT_REF" == refs/tags/* ]]; then
            TAG="${GIT_REF#refs/tags/}"
            # Expected format: v1.0.0-1.18.2
            VERSION=$(echo "$TAG" | sed 's/^v//' | cut -d'-' -f1)
            MC_VERSION=$(echo "$TAG" | sed 's/^v[^-]*-//')
          else
            # Manual trigger: read from gradle.properties on current branch
            VERSION=$(grep 'mod_version=' gradle.properties | cut -d'=' -f2)
            MC_VERSION=$(grep 'minecraft_version=' gradle.properties | cut -d'=' -f2)
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "mc_version=$MC_VERSION" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Java version
        id: java
        run: |
          JAVA_VERSION=$(grep 'java_version=' gradle.properties | cut -d'=' -f2)
          echo "version=$JAVA_VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ steps.java.outputs.version }}
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build

      - name: Publish Forge to CurseForge
        if: hashFiles('forge/build/libs/*.jar') != ''
        uses: itsmeow/curseforge-upload@v3
        with:
          # TODO: Replace with your CurseForge project ID
          project_id: "000000"
          game_endpoint: minecraft
          file_path: forge/build/libs/votifier-forge-${{ steps.tag.outputs.mc_version }}-${{ steps.tag.outputs.version }}.jar
          game_versions: ${{ steps.tag.outputs.mc_version }}
          release_type: release
          token: ${{ secrets.CURSEFORGE_TOKEN }}

      - name: Publish Fabric to CurseForge
        uses: itsmeow/curseforge-upload@v3
        with:
          # TODO: Replace with your CurseForge project ID
          project_id: "000000"
          game_endpoint: minecraft
          file_path: fabric/build/libs/votifier-fabric-${{ steps.tag.outputs.mc_version }}-${{ steps.tag.outputs.version }}.jar
          game_versions: ${{ steps.tag.outputs.mc_version }}
          release_type: release
          token: ${{ secrets.CURSEFORGE_TOKEN }}

      - name: Publish Forge to Modrinth
        if: hashFiles('forge/build/libs/*.jar') != ''
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          # TODO: Replace with your Modrinth project ID
          modrinth-id: "XXXXXXXX"
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          files: forge/build/libs/votifier-forge-${{ steps.tag.outputs.mc_version }}-${{ steps.tag.outputs.version }}.jar
          game-versions: ${{ steps.tag.outputs.mc_version }}
          loaders: forge
          version-type: release

      - name: Publish Fabric to Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          # TODO: Replace with your Modrinth project ID
          modrinth-id: "XXXXXXXX"
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          files: fabric/build/libs/votifier-fabric-${{ steps.tag.outputs.mc_version }}-${{ steps.tag.outputs.version }}.jar
          game-versions: ${{ steps.tag.outputs.mc_version }}
          loaders: fabric
          version-type: release
